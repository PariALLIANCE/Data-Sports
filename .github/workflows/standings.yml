name: Football Standings Scraper

on:
  workflow_dispatch:
  schedule:
    # Tous les jours à 01:00 UTC (modifié pour 00:30 UTC)
    - cron: "30 0 * * *"

jobs:
  scrape-standings:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout complet du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python 3.12
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3️⃣ Installer les dépendances (selenium + webdriver-manager)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install selenium webdriver-manager

      # 4️⃣ Installer Google Chrome (indispensable pour Selenium)
      - name: Setup Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # 5️⃣ 🔥 Rebase AVANT toute écriture
      - name: Sync with remote main
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      # 6️⃣ Exécution du scraper (doit maintenant utiliser Selenium)
      - name: Run standings scraper
        run: python scripts/standings.py

      # 7️⃣ Commit & push des résultats
      - name: Commit and push results
        run: |
          git add data/football/standings/Standings.json
          git commit -m "Update Standings.json" || echo "No changes to commit"
          git push origin main