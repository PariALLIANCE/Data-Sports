name: Teams Scraper (Football + NHL)

on:
  workflow_dispatch:
  schedule:
    # Tous les jours à 00:25 UTC
    - cron: '25 0 * * *'

jobs:
  scrape-teams:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout complet du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python 3.12
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3️⃣ Installer Chrome + Chromedriver
      - name: Install Chrome and Chromedriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      # 4️⃣ Installer les dépendances Python
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install selenium requests beautifulsoup4

      # 5️⃣ Rebase AVANT toute écriture
      - name: Sync with remote main
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true

      # 6️⃣ Script NHL – MATCHS DU JOUR
      - name: Run NHL games scraper
        run: |
          python scripts/NHL/games_of_days_nhl.py

      # 7️⃣ Commit & push NHL games
      - name: Commit and push NHL games
        run: |
          git add data/hockey/games_of_days_nhl.json
          git commit -m "Update NHL games of day" || echo "No changes to commit"
          git push origin main

      # 8️⃣ Rebase avant teams
      - name: Sync with remote main before teams
        run: |
          git pull --rebase origin main || true

      # 9️⃣ Script TEAMS – Football + NHL
      - name: Run teams scraper
        run: |
          python scripts/teams.py

      # 🔟 Commit & push teams
      - name: Commit and push teams
        run: |
          git add data/football/teams/football_teams.json
          git add data/hockey/teams/hockey_NHL_teams.json
          git commit -m "Update Football + NHL teams" || echo "No changes to commit"
          git push origin main