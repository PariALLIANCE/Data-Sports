name: Json makers debut2023

on:
  workflow_dispatch:

jobs:
  scrape-football:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run football scraper
        run: python scripts/cups_debut2023.py

      - name: Sync with remote before push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Commit and push results
        run: |
          git add data/football/leagues/*.json
          git diff --cached --quiet || git commit -m "🤖 Update cups JSONs debut2023"
          git push origin main