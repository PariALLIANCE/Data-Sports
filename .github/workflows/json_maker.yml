name: Json makers debut2023

on:
  workflow_dispatch:

jobs:
  scrape-football:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout complet
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3️⃣ Install Chrome
      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 4️⃣ Dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium beautifulsoup4 webdriver-manager

      # 5️⃣ Rebase AVANT toute écriture
      - name: Sync with remote main
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      # 6️⃣ Exécution du scraper
      - name: Run football scraper
        run: python scripts/l.py

      # 7️⃣ Commit & push
      - name: Commit and push results
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/football/leagues/*.json
          git diff --cached --quiet || git commit -m "Update football JSONs"
          git push origin main