name: Teams Scraper (Football + NHL)

on:
  workflow_dispatch:
  schedule:
    # Tous les jours à 00:25 UTC
    - cron: '25 0 * * *'

jobs:
  scrape-teams:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout complet du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python 3.12
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3️⃣ Installer les dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4

      # 4️⃣ 🔥 Rebase AVANT toute écriture (structure inchangée)
      - name: Sync with remote main
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true

      # 5️⃣ ✅ Script NHL – MATCHS DU JOUR
      - name: Run NHL games scraper
        run: |
          python scripts/NHL/games_of_days_nhl.py

      # 6️⃣ Commit & push (config adaptée)
      - name: Commit and push results
        run: |
          git add data/hockey/games_of_days_nhl.json
          git commit -m "Update NHL games of day" || echo "No changes to commit"
          git push origin main