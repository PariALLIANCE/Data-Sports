name: Build Dataset With Odds

on:
  workflow_dispatch:

jobs:
  build-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Sync with remote main
        run: |
          git pull --rebase origin main

      - name: Run enrich_leagues_with_odds script
        run: |
          python scripts/add_odds.py

      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/football/leagues/
          git add data/football/leagues_with_odds/
          git diff --cached --quiet && echo "Aucune modification détectée" && exit 0
          git commit -m "chore: update leagues with odds [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main
          git push origin main