name: Teams tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager beautifulsoup4

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Show debug info
        run: |
          echo "Python version:"
          python --version
          echo "Chrome version:"
          google-chrome --version || echo "Chrome not found"
          echo "Installed packages:"
          pip list | grep -E "selenium|webdriver|beautifulsoup4|bs4"

      - name: Run scraper
        run: |
          python scripts/Teams_tracker.py
        env:
          DISPLAY: ':99'
          PYTHONUNBUFFERED: 1

      - name: Upload debug files (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            page_source.html
            error_page.html
            page_screenshot.png
            error_screenshot.png
          retention-days: 7

      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if [ -f "data/football/leagues/data_teams.json" ]; then
            git add data/football/leagues/data_teams.json
            if ! git diff --staged --quiet; then
              TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
              git commit -m "🤖 Update Premier League teams results - $TIMESTAMP [skip ci]"

              # ── Retry avec rebase en cas de push concurrent ──────────
              MAX_RETRIES=5
              ATTEMPT=1
              until git push; do
                if [ $ATTEMPT -ge $MAX_RETRIES ]; then
                  echo "❌ Échec du push après $MAX_RETRIES tentatives"
                  exit 1
                fi
                echo "⚠️ Push rejeté, tentative $ATTEMPT/$MAX_RETRIES — pull --rebase puis nouvel essai"
                git pull --rebase origin main
                ATTEMPT=$((ATTEMPT + 1))
              done

              echo "✅ data_teams.json mis à jour"
            else
              echo "📝 Aucun changement"
            fi
          else
            echo "⚠️ data_teams.json non trouvé"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}