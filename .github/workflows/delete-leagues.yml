name: Delete All League JSON Files

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Taper "SUPPRIMER" pour confirmer'
        required: true
        default: ''

jobs:
  delete-files:
    runs-on: ubuntu-latest
    
    steps:
      - name: Vérifier la confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "SUPPRIMER" ]; then
            echo "❌ Opération annulée. Vous devez taper 'SUPPRIMER' pour confirmer."
            exit 1
          fi
          echo "✅ Opération confirmée!"
      
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Configure Git
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
      
      - name: Run delete script
        run: python delete_leagues.py
      
      - name: Push changes
        run: |
          git push origin HEAD
