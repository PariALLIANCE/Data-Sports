name: Scrape Premier League Table

on:
  schedule:
   # - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager
    
    - name: Setup Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    
    - name: Run scraper
      id: scraper
      run: python scraper.py
    
    - name: Upload CSV as artifact
      uses: actions/upload-artifact@v4
      with:
        name: premier-league-table
        path: premier_league_2025-2026.csv
        if-no-files-found: warn
    
    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Vérifier si le fichier existe avant de l'ajouter
        if [ -f "premier_league_2025-2026.csv" ]; then
          git add premier_league_2025-2026.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Premier League table [skip ci]"
          git push
        else
          echo "Fichier premier_league_2025-2026.csv non trouvé, aucun commit effectué"
          exit 1
        fi