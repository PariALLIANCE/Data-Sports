name: Extract Matches With/Without Stats

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # permet de lancer manuellement

jobs:
  process-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Cloner le repo
        uses: actions/checkout@v4

      - name: 🐍 Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Installer dépendances
        run: |
          pip install --upgrade pip

      - name: ▶️ Exécuter le script
        run: |
          python script.py

      - name: 💾 Commit des fichiers générés
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data-with-stats.json data-without-stats.json
          git commit -m "Update extracted data" || echo "No changes to commit"
          git push