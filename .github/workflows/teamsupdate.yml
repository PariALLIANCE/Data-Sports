name: Teams Scraper (Football + NHL)

on:
  workflow_dispatch:
  schedule:
    # Tous les jours à 00:25 UTC
    - cron: '25 0 * * *'

concurrency:
  group: data-sports
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape-teams:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout complet du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python 3.12
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3️⃣ Installer Chrome + Chromedriver
      - name: Install Chrome and Chromedriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      # 4️⃣ Installer les dépendances Python
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install selenium requests beautifulsoup4

      # 5️⃣ Configurer Git
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # 6️⃣ Synchroniser avec main
      - name: Sync with remote main
        run: |
          git fetch origin
          git checkout main
          git reset --hard origin/main

      # 7️⃣ Script NHL – MATCHS DU JOUR
      - name: Run NHL games scraper
        run: |
          python scripts/NHL/games_of_days_nhl.py

      # 8️⃣ Commit & push NHL games
      - name: Commit and push NHL games
        run: |
          git add data/hockey/games_of_days_nhl.json

          if git diff --cached --quiet; then
            echo "No NHL changes."
          else
            git commit -m "Update NHL games of day"
            git push origin main
          fi

      # 9️⃣ Re-synchroniser avant le second script
      - name: Sync with remote main before teams
        run: |
          git fetch origin
          git checkout main
          git reset --hard origin/main

      # 🔟 Script Teams
      - name: Run teams scraper
        run: |
          python scripts/teams.py

      # 1️⃣1️⃣ Commit & push Teams
      - name: Commit and push Teams
        run: |
          git add data/football/teams/football_teams.json
          git add data/hockey/teams/hockey_NHL_teams.json

          if git diff --cached --quiet; then
            echo "No Teams changes."
          else
            git commit -m "Update Football + NHL teams"
            git push origin main
          fi