name: ESPN Scraper - Fortaleza Results

on:
  # Exécution manuelle depuis l'interface GitHub
  workflow_dispatch:
  
  # Exécution automatique tous les jours à 10h UTC
  schedule:
    - cron: '0 10 * * *'
  
  # Exécution sur push vers main (optionnel)
  # push:
  #   branches:
  #     - main

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Configurer Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 3. Installer les dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
      
      # 4. Installer Chrome
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'
      
      # 5. Afficher les versions (debug)
      - name: Show versions
        run: |
          python --version
          pip list
          google-chrome --version || echo "Chrome not found"
      
      # 6. Exécuter le script
      - name: Run scraper
        run: |
          python scripts/newdb.py
        env:
          # Options pour Selenium en mode headless
          DISPLAY: ':99'
      
      # 7. Upload du fichier JSON (artefact)
      - name: Upload JSON results
        uses: actions/upload-artifact@v4
        with:
          name: fortaleza-results
          path: newdb.json
          retention-days: 30
      
      # 8. Sauvegarder dans le repo (optionnel)
      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add newdb.json
          git diff --staged --quiet || git commit -m "🤖 Update Fortaleza results [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}