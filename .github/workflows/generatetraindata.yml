name: Run Python Script

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run script
        run: python t.py

      - name: Commit & push generated file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add dataset-expert-full.json

          # commit seulement s'il y a des changements
          git diff --cached --quiet || git commit -m "Update generated dataset"

          git push
